server{
    listen 80;
    server_name mediverse-management.huaxisy.com;
    root /usr/share/nginx/html;
    index index.html;
    # ---------- Vue Router history 模式 ----------
    location / {
        try_files $uri $uri/ /index.html;
    }
    # ---------- 反向代理 API 请求 ----------
    location /api/ {
        proxy_pass ${API_UPSTREAM};
         # 须与 API_UPSTREAM 的域名一致；若传 $host（localhost），WAF/源站常返回 4xx/5xx
        proxy_set_header Host ${API_PROXY_HOST};           # 设置上游Host，与API_UPSTREAM一致
        proxy_set_header X-Forwarded-Host $host;           # 传递原始域名
        proxy_set_header X-Real-IP $remote_addr;           # 传递客户端真实 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 代理链 IP
        proxy_set_header X-Forwarded-Proto $scheme;        # 传递协议（http/https）
        proxy_ssl_server_name on;                          # 开启 SSL 服务器名称验证
        proxy_ssl_name ${API_PROXY_HOST};                  # 设置上游SSL证书名称，与API_UPSTREAM一致
        proxy_connect_timeout 120s;                        # 连接后端的超时时间
        proxy_read_timeout 120s;                           # 等待后端响应的超时时间
        client_max_body_size 50m;                          # 上传文件大小限制
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    # ---------gzip 压缩---------
    gzip on;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
    gzip_min_length 1024;    # 小于 1KB 的响应不压缩（压缩收益太小）
    gzip_comp_level 9;       # 压缩级别，1-9，9 压缩级别最高，但也会消耗更多 CPU
    gzip_static on;          # 开启静态文件压缩
    gzip_vary on;            # 根据请求头 Accept-Encoding 决定是否压缩响应
    # ---------- 静态资源缓存 ----------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public , immutable";
    }
    # ---------- 上传文件大小 ----------
    client_max_body_size 50m;
}