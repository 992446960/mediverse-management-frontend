# 本地构建并预览生产镜像（nginx 托管静态资源 + /api 反代）
# 使用：docker compose up --build
# 浏览器访问：http://localhost:8080
services:
  frontend:
    # 与多数云服务器一致（amd64）；在 Apple Silicon 本机构建时勿省略，否则 arm64 镜像在 amd64 主机上无法运行
    platform: linux/amd64
    build:
      context: .
      args:
        # 与 nginx.conf 中 /api/ 反代一致；非容器发布且 API 异域时用 build-arg 改成完整 URL
        VITE_API_BASE_URL: /api/v1
    ports:
      - '8080:80'
    environment:
      # 与 Dockerfile 中一致；换域名时两者需同主机名（API_PROXY_HOST 不要含 https://）
      API_UPSTREAM: https://mediverse-management.huaxisy.com
      API_PROXY_HOST: mediverse-management.huaxisy.com
