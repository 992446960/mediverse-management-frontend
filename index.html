<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>医数智台</title>
    <style>
      html, body, #app {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      /* ── 首次加载遮罩 ── */
      #loader-wrapper {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(145deg, #0c2d48 0%, #0a3a5c 30%, #0e4d6e 60%, #145e82 100%);
        overflow: hidden;
      }

      /* 装饰光晕 */
      #loader-wrapper::before,
      #loader-wrapper::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.35;
        pointer-events: none;
      }
      #loader-wrapper::before {
        width: 500px;
        height: 500px;
        top: -120px;
        right: -100px;
        background: radial-gradient(circle, #0EA5E9, transparent 70%);
      }
      #loader-wrapper::after {
        width: 400px;
        height: 400px;
        bottom: -80px;
        left: -60px;
        background: radial-gradient(circle, #38BDF8, transparent 70%);
      }

      /* Logo 容器 */
      #loader-logo-wrap {
        position: relative;
        z-index: 10;
        width: 80px;
        height: 80px;
        margin-bottom: 40px;
      }

      /* Logo 背后光圈 */
      #loader-logo-wrap::before {
        content: "";
        position: absolute;
        inset: -16px;
        border-radius: 28px;
        background: radial-gradient(circle, rgba(14, 165, 233, 0.25), transparent 70%);
        animation: glow-pulse 3s ease-in-out infinite;
      }

      #loader-logo {
        width: 80px;
        height: 80px;
        position: relative;
        filter: drop-shadow(0 4px 20px rgba(14, 165, 233, 0.4));
      }

      /* 旋转圆环 — 单圈优雅弧线 */
      #loader-ring {
        position: relative;
        z-index: 10;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 2.5px solid rgba(255, 255, 255, 0.1);
        border-top-color: rgba(255, 255, 255, 0.85);
        border-right-color: rgba(255, 255, 255, 0.3);
        animation: spin 1.1s cubic-bezier(0.4, 0.15, 0.6, 0.85) infinite;
      }

      /* 进度点 */
      .loader-dots {
        position: relative;
        z-index: 10;
        display: flex;
        gap: 6px;
        margin-top: 32px;
      }
      .loader-dots i {
        display: block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.6);
        animation: dot-bounce 1.4s ease-in-out infinite;
      }
      .loader-dots i:nth-child(2) { animation-delay: 0.16s; }
      .loader-dots i:nth-child(3) { animation-delay: 0.32s; }

      /* 文字 */
      #loader-wrapper .load-title {
        position: relative;
        z-index: 10;
        margin-top: 24px;
        text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: rgba(255, 255, 255, 0.85);
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 1.5px;
      }
      #loader-wrapper .load-sub {
        position: relative;
        z-index: 10;
        margin-top: 8px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      /* ── 退场动画 ── */
      .loaded #loader-wrapper {
        opacity: 0;
        transform: scale(1.02);
        transition: opacity 0.5s 0.1s ease-out, transform 0.5s 0.1s ease-out;
        pointer-events: none;
      }
      .loaded #loader-wrapper * {
        animation-play-state: paused !important;
      }

      /* 延迟隐藏以释放层 */
      .loader-hidden #loader-wrapper {
        display: none;
      }

      /* ── 关键帧 ── */
      @keyframes spin {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes glow-pulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50%      { opacity: 1; transform: scale(1.08); }
      }
      @keyframes dot-bounce {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
        40%           { opacity: 1; transform: scale(1.2); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="loader-wrapper">
        <!-- Logo -->
        <div id="loader-logo-wrap">
          <svg id="loader-logo" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="lg" x1="20" y1="20" x2="180" y2="180" gradientUnits="userSpaceOnUse">
                <stop stop-color="#38BDF8"/>
                <stop offset="1" stop-color="#0EA5E9"/>
              </linearGradient>
            </defs>
            <rect x="20" y="20" width="160" height="160" rx="40" fill="url(#lg)"/>
            <path d="M60 140V80L100 110L140 80V140" stroke="white" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="100" cy="65" r="11" fill="white"/>
            <rect x="72" y="150" width="56" height="5" rx="2.5" fill="white" fill-opacity="0.35"/>
          </svg>
        </div>

        <!-- Spinner -->
        <div id="loader-ring"></div>

        <!-- Dots -->
        <div class="loader-dots"><i></i><i></i><i></i></div>

        <!-- Text -->
        <div class="load-title">正在加载系统资源，请耐心等待</div>
        <div class="load-sub">医数智台</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
