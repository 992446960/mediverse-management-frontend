cases:
  - id: tc-001
    description: "标准格式 Skill 文件的完整分析"
    input:
      skill_file: "examples/input-01.md 中的 code-reviewer skill"
    expected_output:
      structure:
        - "1️⃣ 大致内容（Overview）"
        - "2️⃣ 作用（Purpose）"
        - "3️⃣ 用法（Usage）"
        - "4️⃣ 技术结构分析（Analysis）"
        - "5️⃣ 扩展方向（Extension）"
      contains:
        - "Skill 类型"
        - "结构完整性"
        - "设计亮点"
        - "设计缺陷"
    pass_criteria: contains_all_sections

  - id: tc-002
    description: "残缺 Skill 文件（无 YAML frontmatter）的容错分析"
    input:
      skill_file: |
        # My Skill
        This skill does something useful.
        Just tell the agent to do things.
    expected_output:
      contains:
        - "文件结构异常"
      structure:
        - "4️⃣ 技术结构分析（Analysis）"
    pass_criteria: contains_anomaly_notice

  - id: tc-003
    description: "英文 Skill 文件触发英文输出"
    input:
      skill_file: |
        ---
        name: translate-skill
        version: 1.0.0
        description: "Translates text between languages"
        ---
        # Translate Skill
        ## Purpose
        Translate any text input to a target language.
    expected_output:
      language: "english"
      contains:
        - "Overview"
        - "Purpose"
        - "Usage"
        - "Analysis"
        - "Extension"
    pass_criteria: output_language_matches_input

  - id: tc-004
    description: "短别名 /sa 触发等同于 /skill-analyzer"
    input:
      trigger: "/sa"
      skill_file: "任意 skill 内容"
    expected_output:
      behavior: "与 /skill-analyzer 触发结果完全一致"
    pass_criteria: alias_triggers_same_behavior
